<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Reel handwritten system sketch</title>
  <desc id="desc">A simple flow showing how a brand funds a bounty, a clipper submits a public YouTube link, an agent checks views, and escrow pays the clipper when the result is reached.</desc>
  <defs>
    <filter id="paperShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#1b2a1d" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#1f2a24"/>
    </marker>
    <style>
      .paper { fill: #fffdf7; }
      .dot { fill: #dbe8dc; opacity: 0.55; }
      .line { fill: none; stroke: #1f2a24; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; }
      .thin { fill: none; stroke: #607166; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .green { fill: #d9f9df; }
      .mint { fill: #ecfff0; }
      .cream { fill: #fff3d8; }
      .blue { fill: #e5f5ff; }
      .ink { fill: #18231d; font-family: "Bradley Hand", "Comic Sans MS", "Marker Felt", cursive; }
      .label { font-size: 31px; font-weight: 700; }
      .note { font-size: 22px; opacity: 0.78; }
      .small { font-size: 19px; opacity: 0.72; }
    </style>
  </defs>

