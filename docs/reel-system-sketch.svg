    <circle class="dot" cx="74" cy="124" r="3"/><circle class="dot" cx="154" cy="124" r="3"/><circle class="dot" cx="234" cy="124" r="3"/><circle class="dot" cx="314" cy="124" r="3"/><circle class="dot" cx="394" cy="124" r="3"/><circle class="dot" cx="474" cy="124" r="3"/><circle class="dot" cx="554" cy="124" r="3"/><circle class="dot" cx="634" cy="124" r="3"/><circle class="dot" cx="714" cy="124" r="3"/><circle class="dot" cx="794" cy="124" r="3"/><circle class="dot" cx="874" cy="124" r="3"/><circle class="dot" cx="954" cy="124" r="3"/><circle class="dot" cx="1034" cy="124" r="3"/><circle class="dot" cx="1114" cy="124" r="3"/>
