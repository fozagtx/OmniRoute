    <circle class="dot" cx="74" cy="224" r="3"/><circle class="dot" cx="154" cy="224" r="3"/><circle class="dot" cx="234" cy="224" r="3"/><circle class="dot" cx="314" cy="224" r="3"/><circle class="dot" cx="394" cy="224" r="3"/><circle class="dot" cx="474" cy="224" r="3"/><circle class="dot" cx="554" cy="224" r="3"/><circle class="dot" cx="634" cy="224" r="3"/><circle class="dot" cx="714" cy="224" r="3"/><circle class="dot" cx="794" cy="224" r="3"/><circle class="dot" cx="874" cy="224" r="3"/><circle class="dot" cx="954" cy="224" r="3"/><circle class="dot" cx="1034" cy="224" r="3"/><circle class="dot" cx="1114" cy="224" r="3"/>
    <circle class="dot" cx="74" cy="274" r="3"/><circle class="dot" cx="154" cy="274" r="3"/><circle class="dot" cx="234" cy="274" r="3"/><circle class="dot" cx="314" cy="274" r="3"/><circle class="dot" cx="394" cy="274" r="3"/><circle class="dot" cx="474" cy="274" r="3"/><circle class="dot" cx="554" cy="274" r="3"/><circle class="dot" cx="634" cy="274" r="3"/><circle class="dot" cx="714" cy="274" r="3"/><circle class="dot" cx="794" cy="274" r="3"/><circle class="dot" cx="874" cy="274" r="3"/><circle class="dot" cx="954" cy="274" r="3"/><circle class="dot" cx="1034" cy="274" r="3"/><circle class="dot" cx="1114" cy="274" r="3"/>
    <circle class="dot" cx="74" cy="324" r="3"/><circle class="dot" cx="154" cy="324" r="3"/><circle class="dot" cx="234" cy="324" r="3"/><circle class="dot" cx="314" cy="324" r="3"/><circle class="dot" cx="394" cy="324" r="3"/><circle class="dot" cx="474" cy="324" r="3"/><circle class="dot" cx="554" cy="324" r="3"/><circle class="dot" cx="634" cy="324" r="3"/><circle class="dot" cx="714" cy="324" r="3"/><circle class="dot" cx="794" cy="324" r="3"/><circle class="dot" cx="874" cy="324" r="3"/><circle class="dot" cx="954" cy="324" r="3"/><circle class="dot" cx="1034" cy="324" r="3"/><circle class="dot" cx="1114" cy="324" r="3"/>
