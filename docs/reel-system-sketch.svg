    <circle class="dot" cx="74" cy="424" r="3"/><circle class="dot" cx="154" cy="424" r="3"/><circle class="dot" cx="234" cy="424" r="3"/><circle class="dot" cx="314" cy="424" r="3"/><circle class="dot" cx="394" cy="424" r="3"/><circle class="dot" cx="474" cy="424" r="3"/><circle class="dot" cx="554" cy="424" r="3"/><circle class="dot" cx="634" cy="424" r="3"/><circle class="dot" cx="714" cy="424" r="3"/><circle class="dot" cx="794" cy="424" r="3"/><circle class="dot" cx="874" cy="424" r="3"/><circle class="dot" cx="954" cy="424" r="3"/><circle class="dot" cx="1034" cy="424" r="3"/><circle class="dot" cx="1114" cy="424" r="3"/>
