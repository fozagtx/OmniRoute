  </g>

  <text x="72" y="86" class="ink label">How Reel works</text>
  <text x="72" y="118" class="ink note">Funded clip work. Public links. Agent checks. Escrow pays.</text>

  <g transform="translate(72 166)">
    <path class="line green" d="M4 10 C33 0 181 5 211 9 C225 40 223 102 212 129 C169 139 45 133 7 128 C-2 92 0 47 4 10Z"/>
    <text x="24" y="50" class="ink label">Brand</text>
    <text x="24" y="82" class="ink note">posts bounty</text>
    <text x="24" y="109" class="ink small">target + payout</text>
  </g>

  <path class="line" marker-end="url(#arrow)" d="M304 238 C349 226 382 228 421 240"/>

  <g transform="translate(424 166)">
    <path class="line cream" d="M8 11 C50 2 174 2 214 10 C226 45 222 101 211 130 C167 137 48 136 7 127 C-1 91 0 48 8 11Z"/>
    <text x="25" y="50" class="ink label">Escrow</text>
    <text x="25" y="82" class="ink note">holds reward</text>
    <text x="25" y="109" class="ink small">brand can refund unused</text>
  </g>

  <path class="line" marker-end="url(#arrow)" d="M638 238 C685 226 717 228 758 240"/>

  <g transform="translate(762 166)">
    <path class="line blue" d="M7 11 C45 2 178 4 215 10 C226 43 224 102 211 130 C168 139 46 136 8 127 C0 94 -1 48 7 11Z"/>
    <text x="25" y="50" class="ink label">Clipper</text>
    <text x="25" y="82" class="ink note">submits link</text>
    <text x="25" y="109" class="ink small">public YouTube first</text>
  </g>

  <path class="line" marker-end="url(#arrow)" d="M869 301 C867 347 830 369 772 385"/>

  <g transform="translate(470 342)">
    <path class="line mint" d="M8 12 C55 1 258 4 309 13 C321 51 317 110 307 144 C246 153 71 150 10 142 C-4 103 0 48 8 12Z"/>
    <text x="26" y="54" class="ink label">Agent checks views</text>
    <text x="26" y="88" class="ink note">reads the public page</text>
    <text x="26" y="118" class="ink small">returns the visible count</text>
  </g>

  <path class="line" marker-end="url(#arrow)" d="M470 417 C397 421 336 399 288 350"/>

  <g transform="translate(80 342)">
    <path class="line green" d="M7 11 C48 2 174 3 214 10 C226 44 223 103 212 130 C170 139 45 136 8 127 C0 93 -1 48 7 11Z"/>
    <text x="25" y="50" class="ink label">If target hit</text>
    <text x="25" y="82" class="ink note">pay clipper</text>
    <text x="25" y="109" class="ink small">straight from escrow</text>
  </g>

  <path class="thin" marker-end="url(#arrow)" d="M780 420 C866 445 973 421 1000 350"/>

  <g transform="translate(958 342)">
    <path class="line cream" d="M7 11 C46 2 141 2 179 10 C190 43 187 103 176 130 C139 137 44 135 8 127 C0 92 -1 48 7 11Z"/>
    <text x="24" y="50" class="ink label">Not yet?</text>
    <text x="24" y="82" class="ink note">check later</text>
    <text x="24" y="109" class="ink small">until it passes or closes</text>
  </g>

  <path class="thin" d="M990 326 C1000 290 987 258 947 238"/>
  <text x="728" y="522" class="ink small">No private login. Reel reads the public clip page.</text>
</svg>
